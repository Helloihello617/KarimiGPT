                        </svg>
                    </button>
                    <!-- دکمه میکروفون جدید -->
                    <button type="button" id="mic-btn" class="mic-btn" title="تایپ صوتی">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>
    
                    <input type="text" id="user-input" placeholder="پیام خود را وارد کنید" autocomplete="off">
                    <!-- Added multiple attribute -->
                    <input type="file" id="file-input" style="display:none" multiple>
                </div>
            </div>
        </form>
    </div>

    <script>
        const chatFeed = document.getElementById("chat-feed");
        const chatForm = document.getElementById("chat-form");
        const userInput = document.getElementById("user-input");
        const menuToggle = document.getElementById("menu-toggle");
        const sidenav = document.getElementById("mySidenav");
        const closeBtn = document.querySelector(".sidenav .closebtn"); 
        const attachBtn = document.getElementById("attach-btn");
        const fileInput = document.getElementById("file-input");
        const sendBtn = document.getElementById("send-btn");
        const sendIcon = document.getElementById("send-icon");
        const startInputContainer = document.getElementById("start-input-container");
        const startInput = document.getElementById("start-input");
        const startSendBtn = document.getElementById("start-send-btn");
        const newChatBtn = document.getElementById("new-chat-btn");
        const startAttachBtn = document.getElementById("start-attach-btn");
        const startFileInput = document.getElementById("start-file-input");
        const historyListEl = document.getElementById("history-list");
        const globalMenu = document.getElementById("global-history-menu");
        const darkModeToggle = document.getElementById('dark-mode-toggle');
        const startMicBtn = document.getElementById('start-mic-btn');
        const micBtn = document.getElementById('mic-btn');

        // Preview Containers
        const mainPreview = document.getElementById("file-preview");
        const startPreview = document.getElementById("start-file-preview");

        // Modal Elements
        const customModal = document.getElementById('custom-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const modalInput = document.getElementById('modal-input');
        const modalConfirmBtn = document.getElementById('modal-confirm-btn');
        const modalCancelBtn = document.getElementById('modal-cancel-btn');

        let stopResponse = false;
        let currentInterval = null;
        let messageHistory = [];
        let isMenuOpen = false;
        let currentEditContainer = null;
        let currentEditData = null;
        let activeMenuSessionId = null; 
        let currentModalConfirmCallback = null;

        // ====== DARK MODE LOGIC ======
        // Updated to handle icon preservation
        const themeText = document.getElementById('theme-text');
        const themeIcon = document.getElementById('theme-icon');

        if (localStorage.getItem('theme') === 'dark') {
            enableDarkMode();
        }

        function enableDarkMode() {
            document.body.classList.add('dark-mode');
            if(themeText) themeText.textContent = 'حالت روز';
            // Change icon to Sun
            if(themeIcon) themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
        }

        function disableDarkMode() {
            document.body.classList.remove('dark-mode');
            if(themeText) themeText.textContent = 'حالت شب';
            // Change icon to Moon
            if(themeIcon) themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
        }

        if(darkModeToggle) {
            darkModeToggle.addEventListener('click', (e) => {
                e.preventDefault();
                if (document.body.classList.contains('dark-mode')) {
                    disableDarkMode();
                    localStorage.setItem('theme', 'light');
                } else {
                    enableDarkMode();
                    localStorage.setItem('theme', 'dark');
                }
            });
        }

        // ====== SPEECH RECOGNITION SETUP ======
        let recognition;
        let isRecording = false;

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'fa-IR'; // پیش‌فرض فارسی

            recognition.onstart = function() {
                isRecording = true;
                updateMicUI(true);
            };

            recognition.onend = function() {
                isRecording = false;
                updateMicUI(false);
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                if (startInputContainer.style.display !== 'none') {
                    startInput.value += transcript + " ";
                    startInput.focus();
                } else {
                    userInput.value += transcript + " ";
                    userInput.focus();
                }
            };

            recognition.onerror = function(event) {
                console.error("Speech recognition error", event.error);
                isRecording = false;
                updateMicUI(false);
                showToast("خطا در تشخیص صدا: " + event.error, "error");
            };
        } else {
            console.log("Web Speech API not supported");
            if(startMicBtn) startMicBtn.style.display = 'none';
            if(micBtn) micBtn.style.display = 'none';
        }

        function toggleRecording() {
            if (!recognition) return;
            if (isRecording) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        function updateMicUI(recording) {
            const btns = [startMicBtn, micBtn];
            btns.forEach(btn => {
                if (recording) {
                    btn.classList.add('recording');
                } else {
                    btn.classList.remove('recording');
                }
            });
        }

        if(startMicBtn) startMicBtn.addEventListener('click', toggleRecording);
        if(micBtn) micBtn.addEventListener('click', toggleRecording);


        // ====== TOAST NOTIFICATION FUNCTION ======
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-notification ${type}`;
            
            let iconSvg = '';
            if (type === 'error') {
                iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
            } else if (type === 'success') {
                iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
            }

            toast.innerHTML = `
                <span class="toast-icon">${iconSvg}</span>
                <span>${message}</span>
            `;
            
            container.appendChild(toast);
            
            // Trigger reflow
            void toast.offsetWidth; 
            
            toast.classList.add('show');
            
            // حذف خودکار بعد از 3 ثانیه
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300); // صبر برای انیمیشن خروج
            }, 3000);
        }

        // ====== FILE MANAGEMENT VARIABLES ======
        let selectedFiles = []; // Array to store selected File objects

        // ====== HISTORY MANAGEMENT ======
        let currentSessionId = Date.now().toString(); 
        let allSessions = JSON.parse(localStorage.getItem('chatSessions')) || {}; 

        // ====== MARKDOWN PARSER (Using marked.js) ======
        function parseMarkdown(text) {
            if (!text) return "";
            try {
                // تنظیمات marked
                marked.setOptions({
                    breaks: true, // تبدیل خط جدید به <br>
                    gfm: true     // فعال‌سازی GitHub Flavored Markdown
                });
                
                // تبدیل مارک‌داون به HTML
                const rawHtml = marked.parse(text);
                
                // پاکسازی HTML برای امنیت (جلوگیری از XSS)
                // اگر DOMPurify لود نشده باشد (در صورت قطعی اینترنت)، از خام استفاده میکند
                if (typeof DOMPurify !== 'undefined') {
                    return DOMPurify.sanitize(rawHtml);
                }
                return rawHtml;
            } catch (e) {
                console.error("Markdown parsing error:", e);
                // فال‌بک به متن ساده در صورت خطا
                return text;
            }
        }

        function saveSession() {
            if (messageHistory.length === 0) return;

            let title = allSessions[currentSessionId]?.title || "گفتگوی جدید";
            const firstUserMsg = messageHistory.find(m => m.role === 'user');
            
            if (firstUserMsg && (!allSessions[currentSessionId]?.title || allSessions[currentSessionId].title === "گفتگوی جدید")) {
                title = firstUserMsg.content.substring(0, 30) + (firstUserMsg.content.length > 30 ? "..." : "");
            }

            let isPinned = false;
            if (allSessions[currentSessionId] && allSessions[currentSessionId].pinned) {
                isPinned = true;
            }

            allSessions[currentSessionId] = {
                id: currentSessionId,
                title: title,
                messages: messageHistory,
                timestamp: Date.now(),
                pinned: isPinned
            };
            
            localStorage.setItem('chatSessions', JSON.stringify(allSessions));
            renderHistory();
        }

        function renderHistory() {
            historyListEl.innerHTML = '';
            
            const sortedSessions = Object.values(allSessions).sort((a, b) => {
                if (a.pinned && !b.pinned) return -1;
                if (!a.pinned && b.pinned) return 1;
                return b.timestamp - a.timestamp;
            });

            if (sortedSessions.length === 0) {
                historyListEl.innerHTML = '<div style="padding:10px 30px; font-size:0.8em; color:#999;">هنوز گفگتویی انجام نشده</div>';
                return;
            }

            sortedSessions.forEach(session => {
                const div = document.createElement('div');
                div.className = 'history-item';
                if(session.id === currentSessionId) div.classList.add('active');
                
                div.innerHTML = `
                    <div class="history-title" onclick="loadSession('${session.id}')">
                        ${session.pinned ? '<svg class="pinned-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"></line><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"></path></svg>' : ''}
                        ${session.title}
                    </div>
                    <button class="history-menu-btn" onclick="showHistoryMenu(event, '${session.id}')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
                        </svg>
                    </button>
                `;
                historyListEl.appendChild(div);
            });
        }

        // Global Menu Handlers
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.history-menu-btn') && !e.target.closest('.history-context-menu')) {
                globalMenu.classList.remove('show');
            }
        });

        function showHistoryMenu(e, id) {
            e.stopPropagation();
            activeMenuSessionId = id;
            
            // Update Pin Button Text
            const session = allSessions[id];
            const pinText = document.getElementById('menu-pin-text');
            if (session && session.pinned) {
                pinText.textContent = 'برداشتن پین';
            } else {
                pinText.textContent = 'پین کردن';
            }

            // Position Menu
            const buttonRect = e.currentTarget.getBoundingClientRect();
            globalMenu.style.top = (buttonRect.bottom + 5) + 'px';
            globalMenu.style.left = buttonRect.left + 'px';
            
            // Show
            globalMenu.classList.add('show');
        }

        // Modal Functions
        function showModal(type, title, message, defaultValue = '', onConfirm) {
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            
            if (type === 'prompt') {
                modalInput.style.display = 'block';
                modalInput.value = defaultValue;
                modalMessage.style.display = 'block';
            } else {
                modalInput.style.display = 'none';
                modalMessage.style.display = 'block';
            }

            currentModalConfirmCallback = onConfirm;
            
            customModal.classList.add('show');
            
            if (type === 'prompt') {
                setTimeout(() => modalInput.focus(), 100);
            }
        }

        function closeModal() {
            customModal.classList.remove('show');
            currentModalConfirmCallback = null;
        }

        modalCancelBtn.addEventListener('click', closeModal);

        modalConfirmBtn.addEventListener('click', () => {
            if (currentModalConfirmCallback) {
                if (modalInput.style.display !== 'none') {
                    currentModalConfirmCallback(modalInput.value);
                } else {
                    currentModalConfirmCallback();
                }
            }
            closeModal();
        });

        modalInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                modalConfirmBtn.click();
            }
        });

        function togglePinCurrentSession() {
            if (activeMenuSessionId && allSessions[activeMenuSessionId]) {
                allSessions[activeMenuSessionId].pinned = !allSessions[activeMenuSessionId].pinned;
                localStorage.setItem('chatSessions', JSON.stringify(allSessions));
                renderHistory();
            }
            globalMenu.classList.remove('show');
        }

        function deleteCurrentSession() {
            globalMenu.classList.remove('show');
            if (!activeMenuSessionId) return;
            
            showModal('confirm', 'حذف گفتگو', 'آیا از حذف این گفتگو مطمئن هستید؟', '', () => {
                const idToDelete = activeMenuSessionId;
                delete allSessions[idToDelete];
                localStorage.setItem('chatSessions', JSON.stringify(allSessions));
                
                if (idToDelete === currentSessionId) {
                    // تغییر مهم: پاس دادن true به createNewChat برای نبستن منو
                    createNewChat(true); 
                } else {
                    renderHistory();
                }
            });
        }

        function renameCurrentSession() {
            globalMenu.classList.remove('show');
            if (activeMenuSessionId && allSessions[activeMenuSessionId]) {
                const currentTitle = allSessions[activeMenuSessionId].title;
                showModal('prompt', 'تغییر نام', 'نام جدید را وارد کنید:', currentTitle, (newTitle) => {
                      if (newTitle && newTitle.trim()) {
                           allSessions[activeMenuSessionId].title = newTitle.trim();
                           localStorage.setItem('chatSessions', JSON.stringify(allSessions));
                           renderHistory();
                      }
                });
            }
        }

        function shareCurrentSession() {
           if (activeMenuSessionId && allSessions[activeMenuSessionId]) {
               const session = allSessions[activeMenuSessionId];
               let text = `Chat: ${session.title}\n\n`;
               session.messages.forEach(msg => {
                   text += `${msg.role === 'user' ? 'User' : 'Bot'}: ${msg.content}\n`;
               });
               
               navigator.clipboard.writeText(text).then(() => {
                   alert('محتوای چت در کلیپ‌بورد کپی شد!');
               });
           }
           globalMenu.classList.remove('show');
        }

        function loadSession(id) {
            if (id === currentSessionId) {
                closeNav();
                return;
            }

            currentSessionId = id;
            messageHistory = allSessions[id].messages || [];
            selectedFiles = []; // Clear files on session change
            renderPreviews(mainPreview);
            renderPreviews(startPreview);
            
            chatFeed.innerHTML = '';
            startInputContainer.style.display = 'none';
            chatForm.style.display = 'flex';
            
            stopResponse = false;
            if (currentInterval) clearInterval(currentInterval);

            messageHistory.forEach(msg => {
                const sender = msg.role === 'user' ? 'user' : 'bot';
                addMessage(msg.content, sender, true);
            });

            closeNav();
            renderHistory();
        }
        // ===================================

        function handleOutsideClick(event) {
            if (currentEditContainer && !currentEditContainer.contains(event.target)) {
                const { messageContainer, editContainer, messageElement, iconsContainer } = currentEditData;
                cancelEdit(messageContainer, editContainer, messageElement, iconsContainer);
            }
        }

        function editUserMessage(messageContainer) {
            const messageElement = messageContainer.querySelector('.message');
            const iconsContainer = messageContainer.querySelector('.message-icons-container');
            // USE RAW TEXT IF AVAILABLE
            const originalText = messageElement.dataset.rawText || messageElement.textContent;

            messageElement.style.display = 'none';
            if (iconsContainer) {
                iconsContainer.style.display = 'none';
            }

            const editContainer = document.createElement('div');
            editContainer.classList.add('edit-message-container');
            editContainer.innerHTML = `
                <div class="edit-input-wrapper">
                    <textarea class="edit-textarea" placeholder="پیام خود را ویرایش کنید...">${originalText}</textarea>
                    <div class="edit-buttons">
                        <button class="edit-btn cancel-btn" type="button">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 6L6 18M6 6l12 12"/>
                            </svg>
                            لغو
                        </button>
                        <button class="edit-btn confirm-btn" type="button">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 6L9 17l-5-5"/>
                            </svg>
                            تایید
                        </button>
                    </div>
                </div>
            `;

            messageContainer.appendChild(editContainer);
            currentEditContainer = editContainer;
            
            currentEditData = {
                messageContainer,
                editContainer,
                messageElement,
                iconsContainer
            };

            document.addEventListener('mousedown', handleOutsideClick);

            const textarea = editContainer.querySelector('.edit-textarea');
            textarea.focus();
            textarea.setSelectionRange(textarea.value.length, textarea.value.length);

            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';

            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 200) + 'px';
            });

            editContainer.querySelector('.confirm-btn').addEventListener('click', function() {
                confirmEdit(messageContainer, editContainer, textarea.value, messageElement, iconsContainer);
            });

            editContainer.querySelector('.cancel-btn').addEventListener('click', function() {
                cancelEdit(messageContainer, editContainer, messageElement, iconsContainer);
            });

            textarea.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    cancelEdit(messageContainer, editContainer, messageElement, iconsContainer);
                }
            });
        }

        function confirmEdit(messageContainer, editContainer, newText, messageElement, iconsContainer) {
            const originalText = messageElement.dataset.rawText || messageElement.textContent;
            
            if (newText.trim() === '') {
                alert('پیام نمی‌تواند خالی باشد!');
                return;
            }

            document.removeEventListener('mousedown', handleOutsideClick);

            // Update content and raw text
            messageElement.dataset.rawText = newText.trim();
            
            // حفظ تصاویر هنگام ویرایش متن
            const imagesContainer = messageElement.querySelector('.chat-images-container');
            messageElement.innerHTML = ''; // پاک کردن محتوا برای بازنویسی
            
            // اگر تصویر وجود داشت، اول آن را اضافه کن
            if (imagesContainer) {
                messageElement.appendChild(imagesContainer);
            }

            // ایجاد حباب متن جدید
            const textBubble = document.createElement("div");
            textBubble.className = "user-text-bubble";
            textBubble.innerHTML = parseMarkdown(newText.trim());
            messageElement.appendChild(textBubble);

            messageElement.style.display = 'flex'; // نمایش مجدد پیام

            editContainer.remove();

            if (iconsContainer) {
                iconsContainer.style.display = 'flex';
            }

            currentEditContainer = null;
            currentEditData = null;

            const messageIndex = messageHistory.findIndex(msg => 
                msg.role === "user" && msg.content === originalText
            );

            if (messageIndex !== -1) {
                const messagesToRemove = messageHistory.length - messageIndex - 1;
                messageHistory.splice(messageIndex + 1, messagesToRemove);
                messageHistory[messageIndex].content = newText.trim();
                
                saveSession();

                const allContainers = Array.from(chatFeed.querySelectorAll('.bot-message-container, .user-message-container'));
                const currentIndex = allContainers.indexOf(messageContainer);
                
                if (currentIndex !== -1) {
                    const containersToRemove = allContainers.slice(currentIndex + 1);
                    containersToRemove.forEach(container => container.remove());
                }

                setSendButtonToStop();
                stopResponse = false;
                const typing = showTypingIndicator();
                sendToAPI(newText.trim(), typing);
            }
        }

        function cancelEdit(messageContainer, editContainer, messageElement, iconsContainer) {
            document.removeEventListener('mousedown', handleOutsideClick);
            editContainer.remove();
            messageElement.style.display = 'block';
            if (iconsContainer) {
                iconsContainer.style.display = 'flex';
            }
            currentEditContainer = null;
            currentEditData = null;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                console.log('متن با موفقیت کپی شد');
            }).catch(err => {
                console.error('خطا در کپی کردن متن: ', err);
            });
        }

        function regenerateBotResponse(messageContainer) {
            const lastUserMessage = messageHistory
                .slice()
                .reverse()
                .find(msg => msg.role === "user");
            
            if (!lastUserMessage) {
                console.log("هیچ پیام کاربری برای جنریت دوباره پیدا نشد");
                return;
            }

            messageContainer.remove();

            for (let i = messageHistory.length - 1; i >= 0; i--) {
                if (messageHistory[i].role === "assistant") {
                    messageHistory.splice(i, 1);
                    break;
                }
            }
            
            saveSession();

            setSendButtonToStop();
            stopResponse = false;
            const typing = showTypingIndicator();

            sendToAPI(lastUserMessage.content, typing);
        }

        chatFeed.addEventListener('click', function(e) {
            // Copy logic
            if (e.target.closest('button[title="کپی متن"]')) {
                const messageContainer = e.target.closest('.bot-message-container, .user-message-container');
                if (messageContainer) {
                    const messageElement = messageContainer.querySelector('.message');
                    // Copy raw text if available, otherwise textContent
                    const textToCopy = messageElement.dataset.rawText || messageElement.textContent;
                    copyToClipboard(textToCopy);
                    
                    const copyButton = e.target.closest('button');
                    const originalHTML = copyButton.innerHTML;
                    // Visual feedback
                    copyButton.style.color = "#43a047";
                    setTimeout(() => {
                        copyButton.innerHTML = originalHTML;
                        copyButton.style.color = "";
                    }, 1000);
                }
            }
            
            if (e.target.closest('button[title="جنریت دوباره"]')) {
                const messageContainer = e.target.closest('.bot-message-container');
                if (messageContainer) {
                    regenerateBotResponse(messageContainer);
                }
            }
            
            if (e.target.closest('button[title="ادیت متن"]')) {
                const messageContainer = e.target.closest('.user-message-container');
                if (messageContainer && !currentEditContainer) {
                    editUserMessage(messageContainer);
                }
            }
        });

        function openNav() {
            sidenav.classList.add("open");
            document.body.style.overflow = "hidden";
            // اینجا تغییر ایجاد شد: مخفی کردن دکمه اصلی به جای تغییر متن
            menuToggle.style.visibility = "hidden"; 
            isMenuOpen = true;
            renderHistory();
        }

        function closeNav() {
            sidenav.classList.remove("open");
            document.body.style.overflow = "hidden";
            // نمایش دوباره دکمه اصلی
            menuToggle.style.visibility = "visible";
            isMenuOpen = false;
        }

        menuToggle.addEventListener("click", function() {
            if (isMenuOpen) {
                closeNav();
            } else {
                openNav();
            }
        });

        // اتصال رویداد کلیک برای دکمه بستن داخل منو
        if(closeBtn) {
            closeBtn.addEventListener("click", closeNav);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && isMenuOpen) {
                closeNav();
            }
        });

        document.querySelectorAll('.menu-items a').forEach(link => {
            link.addEventListener('click', closeNav);
        });

        // تغییر مهم: اضافه کردن شرط برای اینکه کلیک روی مودال باعث بسته شدن منو نشود
        document.addEventListener('click', function(e) {
            if (isMenuOpen && 
                !sidenav.contains(e.target) && 
                e.target !== menuToggle && 
                !e.target.closest('.history-context-menu') &&
                !e.target.closest('.modal-overlay') // این خط اضافه شد
            ) {
                closeNav();
            }
        });

        // تغییر مهم: اضافه کردن پارامتر keepNavOpen به تابع
        function createNewChat(keepNavOpen = false) {
            // اگر از طریق دکمه فراخوانی شود، آرگومان اول رویداد است نه boolean
            if (typeof keepNavOpen !== 'boolean') {
                keepNavOpen = false;
            }

            currentSessionId = Date.now().toString();
            messageHistory = [];
            selectedFiles = []; // Clear files
            renderPreviews(mainPreview);
            renderPreviews(startPreview);
            
            chatFeed.innerHTML = '';
            
            // فقط اگر صراحتاً گفته نشده باز بمان، ببند
            if (!keepNavOpen) {
                closeNav();
            }
            
            startInputContainer.style.display = "flex";
            startInputContainer.style.opacity = "1";
            startInputContainer.style.transform = "translate(-50%, -50%)";
            chatForm.style.display = "none";
            startInput.value = ""; 
            
            stopResponse = false;
            currentInterval = null;
            currentEditContainer = null;
            currentEditData = null;
            
            renderHistory(); 
            
            setTimeout(() => {
                startInput.focus();
            }, 300);
            
            console.log("چت جدید ایجاد شد!");
        }

        newChatBtn.addEventListener("click", createNewChat);

        function scrollToBottom() {
            chatFeed.scrollTop = chatFeed.scrollHeight;
        }

        function addMessage(text, sender, isInstant = false, attachments = []) { // Added attachments param
            if (sender === "bot") {
                const messageContainer = document.createElement("div");
                messageContainer.classList.add("bot-message-container");
                
                const msg = document.createElement("div");
                msg.classList.add("message", sender);
                // Store raw text for copy/edit/logic
                msg.dataset.rawText = text;
                
                if(isInstant) msg.classList.add("no-anim"); 

                const isPersian = /[\u0600-\u06FF]/.test(text);

                if (isPersian) {
                    msg.style.direction = "rtl";
                    msg.style.textAlign = "right";
                    msg.style.alignSelf = "flex-end";
                    msg.style.fontFamily = "'Vazir', sans-serif";
                } else {
                    msg.style.direction = "ltr";
                    msg.style.textAlign = "left";
                    msg.style.alignSelf = "flex-start";
                    msg.style.fontFamily = "'Inter', sans-serif";
                }

                messageContainer.appendChild(msg);
                chatFeed.appendChild(messageContainer);
                scrollToBottom();

                if (isInstant) {
                        msg.innerHTML = parseMarkdown(text);
                        addBotIcons(messageContainer);
                        return;
                }

                let i = 0;
                let currentText = "";
                msg.innerHTML = ""; // اطمینان از خالی بودن قبل از شروع

                currentInterval = setInterval(() => {
                    if (stopResponse) {
                        clearInterval(currentInterval);
                        currentInterval = null;
                        setSendButtonToArrow();
                        saveSession(); 
                        return;
                    }
                    if (i < text.length) {
                        currentText += text[i];
                        // تبدیل لحظه‌ای به HTML برای اعمال استایل‌ها حین تایپ
                        msg.innerHTML = parseMarkdown(currentText);
                        i++;
                        scrollToBottom();
                    } else {
                        clearInterval(currentInterval);
                        currentInterval = null;
                        
                        // Apply formatting when typing is done
                        msg.innerHTML = parseMarkdown(text);
                        
                        setSendButtonToArrow();
                        addBotIcons(messageContainer);
                        saveSession(); 
                    }
                }, 20);

            } else {
                const messageContainer = document.createElement("div");
                messageContainer.classList.add("user-message-container");
                
                const msg = document.createElement("div");
                msg.classList.add("message", sender);
                // Store raw text
                msg.dataset.rawText = text;
                
                if(isInstant) msg.classList.add("no-anim");

                // --- NEW CODE START: Render Attachments (Top) ---
                if (attachments && attachments.length > 0) {
                    const imagesContainer = document.createElement("div");
                    imagesContainer.className = "chat-images-container"; // Use class for scrollbar styling
                    imagesContainer.style.display = "flex";
                    imagesContainer.style.flexWrap = "nowrap"; // Changed to nowrap
                    imagesContainer.style.overflowX = "auto"; // Enable horizontal scrolling
                    imagesContainer.style.gap = "5px";
                    
                    // اگر متن هم وجود دارد، فاصله پایین برای تصاویر در نظر بگیر (البته گپ فلکس هم هست)
                    if (text && text.trim().length > 0) {
                        // imagesContainer.style.marginBottom = "5px"; // Handled by gap in .message.user
                    }
                    
                    attachments.forEach(file => {
                        if (file.type.startsWith("image/")) {
                            const img = document.createElement("img");
                            img.src = URL.createObjectURL(file);
                            img.style.maxHeight = "200px";
                            img.style.width = "auto"; 
                            img.style.borderRadius = "10px";
                            img.style.flexShrink = "0"; // Prevent shrinking
                            img.onload = () => scrollToBottom();
                            imagesContainer.appendChild(img);
                        }
                    });
                    if (imagesContainer.children.length > 0) {
                          msg.appendChild(imagesContainer);
                    }
                }
                // --- NEW CODE END ---

                // Render formatted markdown instantly for user (Bottom)
                if (text && text.trim().length > 0) {
                    const textBubble = document.createElement("div");
                    textBubble.className = "user-text-bubble";
                    textBubble.innerHTML = parseMarkdown(text);
                    msg.appendChild(textBubble);
                }
                
                messageContainer.appendChild(msg);
                
                const iconsContainer = document.createElement("div");
                iconsContainer.classList.add("message-icons-container");
                iconsContainer.innerHTML = `
                    <button title="کپی متن"><svg id='Copy_24' width='18' height='18' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg' xmlns:xlink='http://www.w3.org/1999/xlink'><rect width='24' height='24' stroke='none' fill='#000000' opacity='0'/>
                    <g transform="matrix(1 0 0 1 12 12)" >
                    <path style="stroke: none; stroke-width: 1; stroke-dasharray: none; stroke-linecap: butt; stroke-dashoffset: 0; stroke-linejoin: miter; stroke-miterlimit: 4; fill: currentColor; fill-rule: nonzero; opacity: 1;" transform=" translate(-12, -12)" d="M 4 2 C 2.895 2 2 2.895 2 4 L 2 18 L 4 18 L 4 4 L 18 4 L 18 2 L 4 2 z M 8 6 C 6.895 6 6 6.895 6 8 L 6 20 C 6 21.105 6.895 22 8 22 L 20 22 C 21.105 22 22 21.105 22 20 L 22 8 C 22 6.895 21.105 6 20 6 L 8 6 z M 8 8 L 20 8 L 20 20 L 8 20 L 8 8 z" stroke-linecap="round" />
                    </g>
                    </svg></button>

                    <button title="ادیت متن">
                        <svg id="edit_24" width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20.385 6.585 C21.205 5.765 21.205 4.435 20.385 3.615 C19.565 2.795 18.235 2.795 17.415 3.615 L9 12 L9 15 L12 15 L20.385 6.585 Z"
                                stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
                            <path d="M16 5 L19 8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
                            <path d="M7 7 L6 7 C4.895 7 4 7.895 4 9 L4 18 C4 19.105 4.895 20 6 20 L15 20 C16.105 20 17 19.105 17 18 L17 17"
                                stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
                        </svg>
                    </button>
                `;
                
                messageContainer.appendChild(iconsContainer);

                // --- NEW LOGIC: Handle Icon Visibility (Fade in/out) ---
                // 1. نمایش اولیه
                iconsContainer.classList.add('visible');
                
                let hideTimeout;
                
                // تابع برای مخفی کردن
                const hideIcons = () => {
                    iconsContainer.classList.remove('visible');
                };

                // تابع برای نمایش موقت (ریست کردن تایمر)
                const showIconsTemporary = () => {
                    iconsContainer.classList.add('visible');
                    clearTimeout(hideTimeout);
                    hideTimeout = setTimeout(hideIcons, 3000); // 3 ثانیه بعد مخفی شود
                };

                // تنظیم تایمر اولیه برای مخفی کردن بعد از ارسال
                hideTimeout = setTimeout(hideIcons, 3000);

                // 2. هندل کردن کلیک روی پیام (برای موبایل یا وقتی موس نیست)
                messageContainer.addEventListener('click', (e) => {
                    showIconsTemporary();
                });
                // -----------------------------------------------------

                chatFeed.appendChild(messageContainer);
                scrollToBottom();
            }
        }

        function addBotIcons(messageContainer) {
            const iconsContainer = document.createElement("div");
            iconsContainer.classList.add("message-icons-container");
            iconsContainer.innerHTML = `
                <button title="کپی متن"><svg id='Copy_24' width='18' height='18' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg' xmlns:xlink='http://www.w3.org/1999/xlink'><rect width='24' height='24' stroke='none' fill='#000000' opacity='0'/>
                <g transform="matrix(1 0 0 1 12 12)" >
                <path style="stroke: none; stroke-width: 1; stroke-dasharray: none; stroke-linecap: butt; stroke-dashoffset: 0; stroke-linejoin: miter; stroke-miterlimit: 4; fill: currentColor; fill-rule: nonzero; opacity: 1;" transform=" translate(-12, -12)" d="M 4 2 C 2.895 2 2 2.895 2 4 L 2 18 L 4 18 L 4 4 L 18 4 L 18 2 L 4 2 z M 8 6 C 6.895 6 6 6.895 6 8 L 6 20 C 6 21.105 6.895 22 8 22 L 20 22 C 21.105 22 22 21.105 22 20 L 22 8 C 22 6.895 21.105 6 20 6 L 8 6 z M 8 8 L 20 8 L 20 20 L 8 20 L 8 8 z" stroke-linecap="round" />
                </g>
                </svg></button>

                <button title="اشتراک"><svg id='Share_3_24' width='18' height='18' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg' xmlns:xlink='http://www.w3.org/1999/xlink'><rect width='24' height='24' stroke='none' fill='#000000' opacity='0'/>
                <g transform="matrix(1 0 0 1 12 12)" >
                <path style="stroke: none; stroke-width: 1; stroke-dasharray: none; stroke-linecap: butt; stroke-dashoffset: 0; stroke-linejoin: miter; stroke-miterlimit: 4; fill: currentColor; fill-rule: nonzero; opacity: 1;" transform=" translate(-12, -12.15)" d="M 16.707031 2.2929688 L 15.292969 3.7070312 L 17.585938 6 L 17 6 C 10.936593 6 6 10.936593 6 17 L 6 18 L 8 18 L 8 17 C 8 12.017407 12.017407 8 17 8 L 17.585938 8 L 15.292969 10.292969 L 16.707031 11.707031 L 21.414062 7 L 16.707031 2.2929688 z M 2 8 L 2 9 L 2 19 C 2 20.64497 3.3550302 22 5 22 L 19 22 C 20.64497 22 22 20.64497 22 19 L 22 18 L 22 17 L 20 17 L 20 18 L 20 19 C 20 19.56503 19.56503 20 19 20 L 5 20 C 4.4349698 20 4 19.56503 4 19 L 4 9 L 4 8 L 2 8 z" stroke-linecap="round" />
                </g>
                </svg></button>

                <button title="جنریت دوباره"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 4v6h-6"/>
                <path d="M1 20v-6h6"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                </svg></button>
            `;
            messageContainer.appendChild(iconsContainer);
            scrollToBottom();
        }

        function showTypingIndicator() {
            const typing = document.createElement("div");
            typing.classList.add("message", "bot", "typing", "persian-text");
            typing.innerHTML = `<span></span><span></span><span></span>`;
            chatFeed.appendChild(typing);
            scrollToBottom();
            return typing;
        }

        function setSendButtonToStop() {
            sendIcon.innerHTML = `<rect x="4" y="4" width="8" height="8" fill="currentColor"/>`;
        }

        function setSendButtonToArrow() {
            sendIcon.innerHTML = `<path fill-rule="evenodd" d="M8 15a.5.5 0 0 0 .5-.5V3.707l3.146 3.147a.5.5 0 0 0 .708-.708l-4-4-.007-.007a.498.498 0 0 0-.7.007l-4 4a.5.5 0 1 0 .708.708L7.5 3.707V14.5A.5.5 0 0 0 8 15"/>`;
        }

        function sendToAPI(userMessage, typingIndicator) {
            // Include file info if any (Visual only for now since API doesn't support it in this code)
            let messageContent = userMessage;
            if (selectedFiles.length > 0) {
                const fileNames = selectedFiles.map(f => f.name).join(', ');
                messageContent += `\n[فایل‌های پیوست شده: ${fileNames}]`;
            }

            messageHistory.push({ role: "user", content: messageContent });
            saveSession(); 

            // Clear files after sending
            selectedFiles = [];
            renderPreviews(mainPreview);
            renderPreviews(startPreview);

            fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer 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",
                    "Content-Type": "application/json",
                    "HTTP-Referer": window.location.href,
                    "X-Title": "DeepSeek ChatBot"
                },
                body: JSON.stringify({
                    model: "deepseek/deepseek-chat",
                    messages: messageHistory,
                    max_tokens: 500
                })
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                return res.json();
            })
            .then(data => {
                typingIndicator.remove();
                if (data.error) {
                    addMessage("خطا: " + (data.error.message || "خطای ناشناخته"), "bot");
                } else {
                    const answer = data.choices?.[0]?.message?.content || "پاسخی دریافت نشد.";
                    addMessage(answer, "bot");
                    messageHistory.push({ role: "assistant", content: answer });
                    saveSession(); 
                }
            })
            .catch(err => {
                typingIndicator.remove();
                console.error("Error:", err);
                addMessage("خطا در ارتباط با سرور: " + err.message, "bot");
            });
        }

        // ====== FILE HANDLING LOGIC ======
        function handleFileSelection(event, previewContainer) {
            const newFiles = Array.from(event.target.files);
            
            // Check for duplicate names (optional) or just limit count
            if (selectedFiles.length + newFiles.length > 5) {
                // جایگزینی alert با showToast
                showToast("حداکثر 5 فایل مجاز است.", "error");
                return;
            }

            selectedFiles = [...selectedFiles, ...newFiles];
            renderPreviews(mainPreview); // Update both containers just in case
            renderPreviews(startPreview);
            
            // Clear input value to allow selecting the same file again if deleted and re-added
            event.target.value = ''; 
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderPreviews(mainPreview);
            renderPreviews(startPreview);
        }

        function renderPreviews(container) {
            if (!container) return;

            container.innerHTML = '';
            
            if (selectedFiles.length === 0) {
                container.classList.remove('active');
                return;
            }

            container.classList.add('active');

            selectedFiles.forEach((file, index) => {
                const previewItem = document.createElement('div');
                previewItem.className = 'preview-item';

                // Check if file is image
                if (file.type.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.className = 'preview-img';
                    img.file = file;
                    previewItem.appendChild(img);

                    const reader = new FileReader();
                    reader.onload = (e) => { img.src = e.target.result; };
                    reader.readAsDataURL(file);
                } else {
                    // Generic file icon
                    const div = document.createElement('div');
                    div.className = 'preview-file-icon';
                    div.textContent = file.name.split('.').pop().toUpperCase();
                    div.title = file.name;
                    previewItem.appendChild(div);
                }

                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-file';
                removeBtn.innerHTML = '✕';
                removeBtn.onclick = (e) => {
                    e.preventDefault(); // Prevent accidental form submit
                    removeFile(index);
                };

                previewItem.appendChild(removeBtn);
                container.appendChild(previewItem);
            });
        }

        // Attach listeners to file inputs
        startFileInput.addEventListener("change", (e) => handleFileSelection(e, startPreview));
        fileInput.addEventListener("change", (e) => handleFileSelection(e, mainPreview));

        // Update Start Buttons
        startAttachBtn.addEventListener("click", () => {
            startFileInput.click();
        });

        // Start Input Logic
        function handleStartInput() {
            const text = startInput.value.trim();
            // Allow sending if there is text OR files
            if (!text && selectedFiles.length === 0) return;

            // Generate message with file names if needed
            let displayText = text;
            
            // --- MODIFIED: Pass files to addMessage ---
            // Pass a clone of the array because selectedFiles will be cleared
            const currentFiles = [...selectedFiles]; 
            addMessage(displayText, "user", false, currentFiles);
            // ------------------------------------------

            startInput.value = "";

            startInputContainer.style.transition = "opacity 0.5s, transform 0.5s";
            startInputContainer.style.opacity = "0";
            startInputContainer.style.transform = "translate(-50%, -60%)";
            setTimeout(() => {
                startInputContainer.style.display = "none";
                chatForm.style.display = "flex";
                userInput.focus();
            }, 80);

            setSendButtonToStop();
            stopResponse = false;
            const typing = showTypingIndicator();
            sendToAPI(displayText, typing);
        }

        startSendBtn.addEventListener("click", handleStartInput);

        startInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                handleStartInput();
            }
        });

        // Update Main Chat Form Logic
        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            
            if (!text && selectedFiles.length === 0) return;

            // --- MODIFIED: Pass files to addMessage ---
            const currentFiles = [...selectedFiles];
            addMessage(text, "user", false, currentFiles);
            // ------------------------------------------

            userInput.value = "";
            
            setSendButtonToStop();
            stopResponse = false;
            const typing = showTypingIndicator();

            sendToAPI(text, typing);
        });

        sendBtn.addEventListener("click", () => {
            if (currentInterval) {
                stopResponse = true;
                setSendButtonToArrow();
            }
        });

        userInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event("submit"));
            }
        });

        attachBtn.addEventListener("click", () => {
            fileInput.click();
        });
        
        window.addEventListener('load', () => {
            startInput.focus();
            renderHistory(); 
        });
    </script>
    <script>
        // ثبت Service Worker برای قابلیت نصب PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.warn('Service worker registration failed:', err);
                });
            });
        }
    </script>
